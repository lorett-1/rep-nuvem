<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Moderno</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --primary-color: #4a6fa5;
            --primary-hover: #3b5a84;
            --text-color: #2c3e50;
            --border-color: #bdc3c7;
            --border-thick: #34495e;
            --initial-cell-bg: #f8f9fa;
            --user-cell-color: #2980b9;
            --error-color: #e74c3c;
            --success-color: #2ecc71;
        }
 
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
 
        .container {
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
 
        h1 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--primary-color);
            font-size: 2rem;
        }
 
        p {
            margin-bottom: 20px;
            color: #7f8c8d;
            font-size: 0.95rem;
        }
 
        /* Grade do Sudoku */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            border: 3px solid var(--border-thick);
            border-radius: 4px;
            margin-bottom: 20px;
            background-color: var(--border-thick);
        }
 
        .cell {
            width: 100%;
            aspect-ratio: 1;
            background-color: #fff;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--user-cell-color);
            padding: 0;
            outline: none;
            transition: background-color 0.2s;
        }
 
        .cell:focus {
            background-color: #e8f4fd;
        }
 
        /* Divisões dos blocos 3x3 */
        .b-top { border-top: 3px solid var(--border-thick); }
        .b-left { border-left: 3px solid var(--border-thick); }
 
        /* Estilo para números que já vêm fixos no jogo */
        .cell.fixed {
            background-color: var(--initial-cell-bg);
            color: var(--text-color);
            cursor: not-allowed;
        }
 
        /* Classes de validação */
        .cell.error {
            background-color: #fce4e4 !important;
            color: var(--error-color);
        }
 
        /* Botões de Ação */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
 
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
 
        button:hover {
            background-color: var(--primary-hover);
        }
 
        button:active {
            transform: scale(0.98);
        }
 
        button.secondary {
            background-color: #95a5a6;
        }
        button.secondary:hover {
            background-color: #7f8c8d;
        }
 
        #mensagem {
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>
 
    <div class="container">
        <h1>Sudoku</h1>
        <p>Preencha a grade para que cada linha, coluna e bloco 3x3 contenha os números de 1 a 9.</p>
 
        <div id="sudoku-grid"></div>
 
        <div class="btn-group">
            <button onclick="novoJogo()">Novo Jogo</button>
            <button class="secondary" onclick="verificarSolucao()">Verificar</button>
        </div>
 
        <div id="mensagem"></div>
    </div>
 
    <script>
        // Matriz base resolvida e válida de Sudoku
        const matrizBase = [
            [5, 3, 4, 6, 7, 8, 9, 1, 2],
            [6, 7, 2, 1, 9, 5, 3, 4, 8],
            [1, 9, 8, 3, 4, 2, 5, 6, 7],
            [8, 5, 9, 7, 6, 1, 4, 2, 3],
            [4, 2, 6, 8, 5, 3, 7, 9, 1],
            [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 1, 5, 3, 7, 2, 8, 4],
            [2, 8, 7, 4, 1, 9, 6, 3, 5],
            [3, 4, 5, 2, 8, 6, 1, 7, 9]
        ];
 
        let solucaoAtual = [];
        let tabuleiroDesafio = [];
 
        // Função para gerar um tabuleiro único embaralhando os números da base
        function gerarTabuleiro() {
            // Cria um mapeamento aleatório de números (ex: todos os 5 viram 2, todos os 3 viram 7...)
            // Isso garante que a solução gerada continue sendo 100% válida nas regras do Sudoku
            const numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9];
            numeros.sort(() => Math.random() - 0.5);
 
            solucaoAtual = matrizBase.map(linha =>
                linha.map(num => numeros[num - 1])
            );
 
            // Clona a solução para criar o desafio ocultando algumas células (Dificuldade Média: ~42 vazias)
            tabuleiroDesafio = solucaoAtual.map(linha => [...linha]);
           
            let celulasParaRemover = 42;
            while (celulasParaRemover > 0) {
                const r = Math.floor(Math.random() * 9);
                const c = Math.floor(Math.random() * 9);
                if (tabuleiroDesafio[r][c] !== '') {
                    tabuleiroDesafio[r][c] = '';
                    celulasParaRemover--;
                }
            }
        }
 
        function renderizarTabuleiro() {
            const grid = document.getElementById('sudoku-grid');
            grid.innerHTML = '';
            document.getElementById('mensagem').innerText = '';
 
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.inputMode = 'numeric'; // Otimiza teclado numérico no celular
                    input.className = 'cell';
                   
                    // Cria as marcações visuais dos quadrantes 3x3
                    if (r % 3 === 0 && r !== 0) input.classList.add('b-top');
                    if (c % 3 === 0 && c !== 0) input.classList.add('b-left');
 
                    const valor = tabuleiroDesafio[r][c];
                    if (valor !== '') {
                        input.value = valor;
                        input.classList.add('fixed');
                        input.disabled = true;
                    } else {
                        // Filtra a digitação para aceitar apenas números de 1 a 9
                        input.oninput = function() {
                            this.value = this.value.replace(/[^1-9]/g, '');
                            this.classList.remove('error');
                            document.getElementById('mensagem').innerText = '';
                        };
                    }
 
                    // Guarda a posição da célula para validação posterior
                    input.dataset.row = r;
                    input.dataset.col = c;
 
                    grid.appendChild(input);
                }
            }
        }
 
        function verificarSolucao() {
            const inputs = document.querySelectorAll('.cell');
            const msgDiv = document.getElementById('mensagem');
            let ganhou = true;
            let preenchidoCompleto = true;
 
            inputs.forEach(input => {
                const r = parseInt(input.dataset.row);
                const c = parseInt(input.dataset.col);
                const valorDigitado = input.value;
 
                if (valorDigitado === '') {
                    preenchidoCompleto = false;
                    ganhou = false;
                    return;
                }
 
                // Se o valor digitado estiver errado comparado à solução real
                if (parseInt(valorDigitado) !== solucaoAtual[r][c]) {
                    input.classList.add('error');
                    ganhou = false;
                } else {
                    input.classList.remove('error');
                }
            });
 
            if (!preenchidoCompleto) {
                msgDiv.style.color = '#e67e22';
                msgDiv.innerText = 'Ainda restam casas vazias no tabuleiro!';
            } else if (ganhou) {
                msgDiv.style.color = 'var(--success-color)';
                msgDiv.innerText = '🎉 Excelente! Você resolveu o Sudoku corretamente!';
            } else {
                msgDiv.style.color = 'var(--error-color)';
                msgDiv.innerText = 'Alguns números estão incorretos. Corrija as casas destacadas em vermelho.';
            }
        }
 
        function novoJogo() {
            gerarTabuleiro();
            renderizarTabuleiro();
        }
 
        // Inicializa o primeiro jogo automaticamente
        novoJogo();
    </script>
</body>
</html>
